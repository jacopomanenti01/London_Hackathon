services:
  surrealdb:
    image: surrealdb/surrealdb:latest
    container_name: surrealdb
    user: root
    ports:
      - "0.0.0.0:8000:8000"
    volumes:
      - surrealdb_data:/mydata
    command: start --log debug --user root --pass root surrealkv:/mydata/database.db
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  surrealdb_data:
  ollama_data: