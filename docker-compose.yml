services:
  surrealdb:
    image: surrealdb/surrealdb:latest
    container_name: surrealdb
    user: root
    ports:
      - "0.0.0.0:8000:8000"
    volumes:
      - surrealdb_data:/mydata
    command: start --log info --user root --pass root surrealkv:/mydata/database.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  surrealdb_data:
