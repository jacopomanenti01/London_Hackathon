# Retrieval profile: schema_aware_graph_hybrid
# Default profile for chat / Q&A workflows.
# Uses the active schema to bias retrieval toward relevant sections.

profile_id: schema_aware_graph_hybrid
name: Schema-Aware Graph-Hybrid
description: >
  Schema-aware hybrid strategy that uses section/field metadata from
  the active profile schema to focus graph expansion and keyword
  search on the most relevant evidence. Designed for chat workflows
  where the user question targets specific due diligence areas.

retrievers:
  - type: keyword
    weight: 0.35
    top_k: 10
  - type: graph
    weight: 0.65
    top_k: 15

graph_expansion:
  enabled: true
  depth: 2
  edge_types:
    - evidence_supports_claim
    - claim_belongs_to_company
    - source_has_evidence
  max_neighbors_per_hop: 15
  # Schema-aware: expand only sections relevant to the query
  schema_guided: true

reranking:
  enabled: true
  method: schema_field_boost
  weights:
    keyword: 0.30
    graph_proximity: 0.30
    schema_field_match: 0.25
    freshness: 0.15

contradiction_handling: surface
context_packing: deduplicate_and_summarize
max_context_tokens: 6000
